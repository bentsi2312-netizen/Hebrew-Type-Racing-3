<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הקלדת מילים בעברית - משחק</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body{margin:0;min-height:100vh;font-family:'Noto Sans Hebrew',Arial,sans-serif;background:linear-gradient(135deg,#1d4ed8,#7c3aed,#10b981);color:#fff;display:grid;place-items:center;padding:20px}
    .card{width:min(100%,900px);background:rgba(255,255,255,.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.2);border-radius:28px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
    h1{margin:0 0 12px;font-size:clamp(2rem,5vw,3.5rem)}
    p{color:#eef2ff;line-height:1.7}
    .sentence{font-size:1.7rem;background:rgba(255,255,255,.12);padding:18px;border-radius:18px;margin:18px 0;white-space:nowrap;overflow:auto}
    input{width:100%;padding:18px;border:none;border-radius:18px;font-size:1.2rem}
    .ok{color:#4ade80;font-weight:900}.bad{color:#f87171;font-weight:900}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    button{border:none;border-radius:16px;padding:14px 18px;font-weight:800;cursor:pointer}
    .primary{background:#0ea5e9;color:#fff}.ghost{background:rgba(255,255,255,.14);color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <h1>התחלת המשחק</h1>
    <p>הנה מסך משחק עובד, כדי שהכפתור "התחל לשחק" באמת יעבוד. אפשר להמשיך ולשדרג אותו אחר כך.</p>
    <div class="sentence" id="sentence"></div>
    <input id="typing" type="text" placeholder="התחל להקליד כאן..." autocomplete="off" />
    <div class="row">
      <button class="primary" id="newSentence">משפט חדש</button>
      <button class="ghost" onclick="location.href='/'">חזרה להתחברות</button>
    </div>
  </div>
  <script>
    const sentences = [
      'הקלדה מהירה בעברית יכולה להיות גם כיפית וגם שימושית.',
      'האתר שלך כבר באוויר ועכשיו גם מסך המשחק עובד.',
      'כדי לנצח צריך להקליד נכון ובמהירות גבוהה.',
      'המקלדת בעברית מאפשרת לך להתאמן בכל מקום.'
    ];
    const sentenceEl = document.getElementById('sentence');
    const inputEl = document.getElementById('typing');

    function esc(s){return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
    let current = '';
    function render(){
      const typed = inputEl.value;
      let html = '';
      for(let i=0;i<current.length;i++){
        const ch = esc(current[i]);
        if(i < typed.length){
          html += typed[i] === current[i] ? `<span class="ok">${ch}</span>` : `<span class="bad">${ch}</span>`;
        } else {
          html += ch;
        }
      }
      sentenceEl.innerHTML = html;
    }
    function pick(){
      current = sentences[Math.floor(Math.random()*sentences.length)];
      inputEl.value = '';
      render();
      inputEl.focus();
    }
    inputEl.addEventListener('input', render);
    document.getElementById('newSentence').addEventListener('click', pick);
    pick();
  </script>
</body>
</html>
